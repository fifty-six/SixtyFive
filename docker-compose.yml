services:
  sixtyfive:
    build: .
    restart: always
    environment:
      XDG_CONFIG_HOME: "/app/cfg"
    volumes:
      - ./config:/app/cfg/SixtyFive
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    # ports:
    #   - 5433:5432
    env_file: .env
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
